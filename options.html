<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>Ask Chat Selection 设置</title>
    <style>
      body {
        width: 340px;
        box-sizing: border-box;
        margin: 0;
        padding: 16px 16px 10px;
        background: #ffffff;
        color: #202124;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      h1 {
        margin: 0 0 14px;
        font-size: 18px;
      }

      label {
        display: block;
        margin-top: 12px;
        color: #5f6673;
        font-size: 12px;
        font-weight: 700;
      }

      .toggle-row {
        width: min(100%, 300px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 12px;
      }

      .toggle-row label {
        margin: 0;
      }

      .toggle-row input {
        width: 18px;
        height: 18px;
        margin: 0;
        padding: 0;
        accent-color: #1f2937;
      }

      input,
      textarea {
        width: min(100%, 300px);
        margin-top: 6px;
        padding: 0 10px;
        border: 1px solid #dfe3eb;
        border-radius: 8px;
        color: #202124;
        font: inherit;
      }

      input {
        height: 36px;
      }

      textarea {
        min-height: 72px;
        padding: 9px 10px;
        resize: vertical;
        line-height: 1.4;
      }

      button {
        width: min(100%, 300px);
        height: 38px;
        margin-top: 16px;
        border: none;
        border-radius: 8px;
        background: #1f2937;
        color: #fff;
        cursor: pointer;
        font-weight: 700;
      }

      button:hover {
        background: #111827;
      }

      button:active {
        background: #0b1220;
      }

      .hint {
        margin: 8px 0 0;
        color: #7d8492;
        font-size: 12px;
        line-height: 1.45;
      }

      .status {
        min-height: 14px;
        margin-top: 6px;
        color: #0f8f6a;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Ask Chat Selection</h1>
    <label for="apiBaseUrl">OpenAI-compatible Base URL</label>
    <input id="apiBaseUrl" placeholder="https://api.openai.com/v1">

    <label for="model">Model</label>
    <input id="model" placeholder="gpt-4o-mini">

    <label for="apiKey">API Key</label>
    <input id="apiKey" type="password" placeholder="sk-...">

    <label for="temperature">Temperature</label>
    <input id="temperature" type="number" min="0" max="2" step="0.1" placeholder="0.2">

    <div class="toggle-row">
      <label for="enableAnswerFormatInstruction">启用自定义回答要求</label>
      <input id="enableAnswerFormatInstruction" type="checkbox">
    </div>

    <label for="answerFormatInstruction">自定义回答要求</label>
    <textarea id="answerFormatInstruction" placeholder="例如：用三条 bullet 回答；中英双语；先给结论再解释。"></textarea>

    <button id="save" type="button">Save</button>
    <p class="hint">支持 OpenAI-compatible Chat Completions。Base URL 填到 /v1 即可，也可以填完整 /chat/completions。</p>
    <div id="status" class="status"></div>
    <script src="options.js"></script>
  </body>
</html>
